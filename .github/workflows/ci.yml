name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        # AI_GATEWAY_API_KEY sourced from a repo secret if one exists — the
        # closed-corpus eval harness (evals/eval.test.ts) shows as skipped
        # without it (today's state) and runs for real the moment the
        # secret is added, with zero further code/workflow changes needed.
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
        run: npx vitest run
